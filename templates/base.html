<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema Experto Académico</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="{{ url_for('index') }}">Diagnóstico Académico</a>
        <nav>
            {% if g.usuario %}
                <a href="{{ url_for('diagnostico') }}">Diagnóstico</a>
                <a href="{{ url_for('historial') }}">Historial</a>
                <a href="{{ url_for('logout') }}">Salir</a>
            {% else %}
                <a href="{{ url_for('login') }}">Login</a>
                <a href="{{ url_for('registro') }}">Registro</a>
            {% endif %}
        </nav>
    </header>

    <main class="page">
        {% for category, message in get_flashed_messages(with_categories=true) %}
            <p class="alert {{ category }}">{{ message }}</p>
        {% endfor %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
